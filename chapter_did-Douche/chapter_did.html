#From Correlation to Causation





- What do we mean by “causal”?
- Why correlation is not (necessarily) causation
- How randomization turns correlation into causation
- Common pitfalls: confounding, colliders, selection bias, Simpson’s paradox

--

Learning goals:
- Recognise when a correlation is causal (and when it isn’t)
- Draw and reason with simple causal diagrams
- Identify what needs to be adjusted for (and what must not)
- Implement simple causal analyses in R

---



##  **Spot the causal claim**

- Coffee drinking is associated with longer lifespan.
- Students who attend office hours get higher grades.
- Areas with more police officers have more recorded crime.
- Sleep deprivation reduces reaction time.

For each:
- Is it causal or correlational?
- If correlational, what else could explain it?

--


  ** Answers: **
- Coffee: confounding by health behaviours or socioeconomic status.
- Office hours: selection, motivated or struggling students self-select.
- Police and crime: reverse causality or measurement (more police → more detection).
- Sleep deprivation: plausibly causal (supported by experiments).


*** Main lesson: *** before analyzing, articulate alternative explanations.

---

## Correlation vs causation

- Correlation: two variables move together.  

   Symmetric, descriptive, unitless; does not imply direction. 
   
- Causation: changing X (while holding other causes fixed, ** ceteris paribus **) changes Y. 

   Asymmetric, requires assumptions or design.

Key idea:
- Correlation becomes causal when we can rule out alternative pathways linking X and Y.


---

## ** When does correlation equal causation? **

- In a well-conducted randomized experiment:
  - Treatment assignment is independent of all prior causes of the outcome.
  
  - Groups are exchangeable on average.
  
  - The difference in means estimates the causal effect.

--

We’ll simulate an RCT.



``` r
n &lt;- 1000
tau &lt;- 2  # true average treatment effect (ATE)

d_rct &lt;- tibble(
  W = rbinom(n, 1, 0.5),               # randomized treatment
  Y0 = rnorm(n, 10, 2),                # potential outcome under control
  Y1 = Y0 + tau,                       # treatment adds tau
  Y  = if_else(W == 1, Y1, Y0)         # observed outcome
)

ate_est &lt;- with(d_rct, mean(Y[W==1]) - mean(Y[W==0]))
paste0("Estimated ATE (difference in means): ", round(ate_est, 3))
```

```
## [1] "Estimated ATE (difference in means): 1.786"
```

## ** Potential outcomes: a minimal primer **

- Each unit i has two potential outcomes: `\(Y_i(1)\)`, `\(Y_i(0)\)`
- Causal effect for i: `\(τ_i\)` = `\(Y_i(1)\)` − `\(Y_i(0)\)`
- Fundamental problem: we never observe both for the same i
- Randomization ensures E[Y(0) | W=1] = E[Y(0) | W=0],

so:
  - ATE = E[Y | W=1] − E[Y | W=0] under random assignment

In observational data, we seek conditions under which this comparison is still valid (or can be made valid by adjustment).

--


** Note: **  The core challenge is missing counterfactuals. Randomization makes the missing counterfactuals ignorable on average; observational studies must emulate this by conditioning on confounders.
---



##  The anatomy of ** bias **

Main threats:
- Confounding (common causes)
- Reverse causality (Y → X)
- Selection/collider bias (conditioning on a common effect)
- Measurement error and missing data
- Model misspecification

--


** Do you re-call our inital examples: **

-  health consciousness affects both coffee and longevity (confounding).
-  sicker people reduce exercise (reverse causality).
-  looking only at hospitalised patients (selection).


We’ll use ** Causal diagrams (DAGs) ** to help us see and fix these.

---


## **Causal Diagrams (DAGs)**: Core Building Blocks

- Nodes: variables
- Arrows: causal influence
- Acyclic: arrows never loop back


DAGs help us decide *what* to control for to isolate the causal effect (`\(\mathbf{X \to Y}\)`).

### Structural Motifs &amp; Adjustment Rules
&lt;div style="font-size: 0.75em;"&gt;

Table: Fundamental Causal Motifs and Adjustment Rules

|Motif                     |Structure |Problem                                                           |Action                                                           |
|:-------------------------|:---------|:-----------------------------------------------------------------|:----------------------------------------------------------------|
|Fork (Confounder)         |X ← Z → Y |Z creates a spurious correlation between X and Y.                 |**Adjust for Z** (Blocks the path).                              |
|Chain (Mediator)          |X → M → Y |M is the mechanism by which X affects Y.                          |**Do NOT adjust for M** (Unless finding only the direct effect). |
|Collider (Selection Bias) |X → S ← Y |Conditioning on S creates a spurious correlation between X and Y. |**Crucial: Do NOT adjust for S** (Adjusting opens the path).     |

---

## ** Confounding in practice ** (observational study)

Simulated confounded study:
- X (treatment) depends on a pre-treatment risk score Z
- Y depends on both X and Z
- Naive regression is biased; adjustment recovers τ

--

```
## # A tibble: 3 × 2
##   Model               Estimate
##   &lt;chr&gt;                  &lt;dbl&gt;
## 1 Naive: Y ~ X            4.41
## 2 Adjusted: Y ~ X + Z     3.01
## 3 Truth (ATE)             3
```

** Note: ** The naive estimate generally overstates the effect because treated units have higher Z (and Z improves Y). After adjusting for Z, the coefficient on X approaches the true τ=3. Highlight that adjustment requires measuring the right Z’s.

## Collider bias: **selection** can create spurious correlations

- X and Y are independent causes of selection S
- Conditioning on S (e.g., only looking at admitted/hired/hospitalised) induces a correlation between X and Y

Simulation:

```
## # A tibble: 2 × 2
##   Sample           Correlation
##   &lt;chr&gt;                  &lt;dbl&gt;
## 1 Unconditional       -0.00226
## 2 Condition on S=1    -0.330
```


---

&lt;img src="chapter_did_files/figure-html/plot-collider-1.svg" style="display: block; margin: auto;" /&gt;

** Note: ** A and B are uncorrelated in the population, but among selected (S=1), high A tends to coincide with lower B and vice versa. Moral: filtering your data on outcomes or post-treatment variables can manufacture correlations out of thin air.

## **Simpson’s paradox**

- An association reverses when aggregating across groups.
- Often due to confounding by group/strata.

Example: UC Berkeley admissions

```
## # A tibble: 2 × 2
##   Gender  rate
##   &lt;fct&gt;  &lt;dbl&gt;
## 1 Male   0.445
## 2 Female 0.304
```

## **Adjustment**: regression as statistical control

If ignorability holds given Z:
- Y(x) ⟂ X | Z
- Then E[Y | do(X=x)] = `\(E_Z\)`[ E[Y | X=x, Z] ]

In practice:
- Fit Y ~ X + Z
- Interpret coefficient on X as adjusted effect (under assumptions)

Caution:
- Include pre-treatment confounders
- Do not control for colliders or post-treatment variables

## **What should we adjust for?**

- Pre-treatment confounders: Yes
- Mediators: No, if estimating total effect
- Colliders/selection variables: No
- Descendants of colliders: No

# Evaluation methods

* Multiple regression often does not provide causal estimates because of ***selection on unobservables***.

--

* RCTs are one way to solve this problem but they are often impossible to do.

--

* Four main causal evaluation methods used in economics:

  - ***instrumental variables (IV)***,
  - ***propensity-score matching***,
  - ***differences-in-differences (DiD)***, and
  - ***regression discontinuity designs (RDD)***.

--

* These methods are used to identify __causal relationships__ between treatments and outcomes.

--

* In this lecture, we will cover a popular and rigorous program evaluation method: __differences-in-differences__.

--

* Next week we will look at __regression discontinuity designs__.

---

# Differences-in-Differences (DiD)

* Usual starting point: subjects are not randomly allocated to treatment ⚠️

--

## DiD Requirements:

--

* 2 time periods: before and after treatment.

--

* 2 groups:

--
  - ***control group:*** never receives treatment,

--

  - ***treatment group:*** initially untreated and then fully treated.
  
--

* Under certain assumptions, control group can be used as the counterfactual for treatment group  

---

# An Example: Minimum Wage and Employment

--

* Imagine you are interested in assessing the __causal__ impact of increasing the minimum wage on (un)employment.

--

* Why is this not that straightforward? What should the control group be?

---
* Why is this not that straightforward? What should the control group be?

&lt;img src="chapter_did_files/figure-html/unnamed-chunk-2-1.svg" style="display: block; margin: auto;" /&gt;


** Note:** Any change in the local economy that affects employment (`\(Y\)`) also affects the political will to raise the minimum wage (`\(X\)`). These are called unobserved economy-wide shocks (`\(Z\)`).

Example: A city raises the minimum wage. Employment falls. Was it the new wage law, or was it a regional recession that was going to reduce employment anyway?

---

* Seminal 1994 [paper](http://davidcard.berkeley.edu/papers/njmin-aer.pdf) by prominent labor economists David Card and Alan Krueger entitled "Minimum Wages and Employment: A Case Study of the Fast-Food Industry in New Jersey and Pennsylvania"

--

* Estimates the effect of an increase in the minimum wage on the employment rate in the fast-food industry. Why this industry?

--

**Think of** burger and pizza restaurants!

--

-Heavily dominated by low-skilled workers 

-Fast-food franchises tend to draw workers from very localized labor markets

-Easy to survey

# DiD in Regression Form

* In practice, DiD is usually estimated on more than 2 periods (4 observations)

* There are more data points before and after the policy change

--

3 ingredients:

--

1. __Treatment dummy variable__: `\(TREAT_s\)` where the `\(s\)` subscript reminds us that the treatment is at the state level

--

1. __Post-treatment periods dummy variables__: `\(POST_t\)` where the `\(t\)` subscript reminds us that this variable varies over time

--

1. __Interaction term between the two__: `\(TREAT_s \times POST_t\)` 👉 the ***coefficient on this term is the DiD causal effect***!

---

# DiD in Regression Form

__Treatment dummy variable__
$$
TREAT_s = \begin{cases}\begin{array}{lcl}
0 \quad \text{if } s = \text{Pennsylvania} \\\
1 \quad \text{if } s = \text{New Jersey}
\end{array}\end{cases}
$$

--

__Post-treatment periods dummy variable__
$$
POST_t = \begin{cases}\begin{array}{lcl}
0 \quad \text{if } t &lt; \text{April 1, 1992} \\\
1 \quad \text{if } t \geq \text{April 1, 1992}
\end{array}\end{cases}
$$

--

__Which observations correspond to `\(TREAT_s \times POST_t = 1\)`?__

--

* Let's put all these ingredients together:
`$$EMP_{st} = \alpha + \beta TREAT_s + \gamma POST_t + \delta(TREAT_s \times POST_t) + \varepsilon_{st}$$`

* `\(\delta\)`: causal effect of the minimum wage increase on employment

---

# Understanding the Regression

`$$EMP_{st} = \color{#d96502}\alpha + \color{#027D83}\beta TREAT_s + \color{#02AB0D}\gamma POST_t + \color{#d90502}\delta(TREAT_s \times POST_t) + \varepsilon_{st}$$`

--

We have the following:

--

`\(\mathbb{E}(EMP_{st} \; | \; TREAT_s = 0, POST_t = 0) = \color{#d96502}\alpha\)`

--

`\(\mathbb{E}(EMP_{st} \; | \; TREAT_s = 0, POST_t = 1) = \color{#d96502}\alpha + \color{#02AB0D}\gamma\)`

--

`\(\mathbb{E}(EMP_{st} \; | \; TREAT_s = 1, POST_t = 0) = \color{#d96502}\alpha + \color{#027D83}\beta\)`

--

`\(\mathbb{E}(EMP_{st} \; | \; TREAT_s = 1, POST_t = 1) = \color{#d96502}\alpha + \color{#027D83}\beta + \color{#02AB0D}\gamma + \color{#d90502}\delta\)`

--

`$$[\mathbb{E}(EMP_{st} \; | \; TREAT_s = 1, POST_t = 1)-\mathbb{E}(EMP_{st} \; | \; TREAT_s = 1, POST_t = 0)] - \\
[\mathbb{E}(EMP_{st} \; | \; TREAT_s = 0, POST_t = 1)-\mathbb{E}(EMP_{st} \; | \; TREAT_s = 0, POST_t = 0)] = \color{#d90502}\delta$$`

---

# Understanding the Regression

`$$EMP_{st} = \color{#d96502}\alpha + \color{#027D83}\beta TREAT_s + \color{#02AB0D}\gamma POST_t + \color{#d90502}\delta(TREAT_s \times POST_t) + \varepsilon_{st}$$`

In table form:


   | Pre mean | Post mean | `\(\Delta\)`(post - pre)

# DiD Crucial Assumption: Parallel Trends

&gt; __Common or parallel trends assumption__: absent any minimum wage increase, Pennsylvania's fast-food employment trend would have been what we should have expected to see in New Jersey.

--

* This assumption states that Pennsylvania's fast-food employment trend between February and November 1992 provides a reliable counterfactual employment trend New Jersey's fast-food industry *would have experienced* had New Jersey not increased its minimum wage.

--

* Impossible to completely validate or invalidate this assumption.

* *Intuitive check:* compare trends before policy change (and after policy change if no expected medium-term effects)

# Parallel Trends Assumption: Formally

Let:

* `\(Y_{ist}^1\)`: fast food employment at restaurant `\(i\)` in state `\(s\)` at time `\(t\)` if there is a high state MW;

--

* `\(Y_{ist}^0\)`: fast food employment at restaurant `\(i\)` in state `\(s\)` at time `\(t\)` if there is a low state MW;

--

These are potential outcomes, you can only observe one of the two.

--

The key assumption underlying DiD estimation is that, in the no-treatment state, restaurant `\(i\)`'s outcome in state `\(s\)` at time `\(t\)` is given by:

`$$\mathbb{E}[Y_{ist}^0|s,t] = \gamma_s + \lambda_t$$`

2 implicit assumptions:

1. ***Selection bias***: relates to fixed state characteristics `\((\gamma)\)`

2. ***Time trend***: same time trend for treatment and control group `\((\lambda)\)`

---

# Parallel Trends Assumption: Formally

Outcomes in the comparison group:

`$$\mathbb{E}[Y_{ist}| s = \text{Pennsylvania},t = \text{Feb}] = \gamma_{PA} + \lambda_{Feb}$$`
--

`$$\mathbb{E}[Y_{ist}|s = \text{Pennsylvania},t = \text{Nov}] = \gamma_{PA} + \lambda_{Nov}$$`

--

$$
`\begin{align}
\mathbb{E}[Y_{ist}&amp;|s = \text{Pennsylvania},t = \text{Nov}] - \mathbb{E}[Y_{ist}| s = \text{Pennsylvania},t = \text{Feb}] \\
&amp;= \gamma_{PA} + \lambda_{Nov} - (\gamma_{PA} + \lambda_{Feb}) \\
&amp;= \lambda_{Nov} - \lambda_{Feb}
\end{align}`
$$

---

# Parallel Trends Assumption: Formally

Outcomes in the comparison group:

`$$\mathbb{E}[Y_{ist}| s = \text{Pennsylvania},t = \text{Feb}] = \gamma_{PA} + \lambda_{Feb}$$`

`$$\mathbb{E}[Y_{ist}|s = \text{Pennsylvania},t = \text{Nov}] = \gamma_{PA} + \lambda_{Nov}$$`

$$
`\begin{align}
\mathbb{E}[Y_{ist}&amp;|s = \text{Pennsylvania},t = \text{Nov}] - \mathbb{E}[Y_{ist}| s = \text{Pennsylvania},t = \text{Feb}] \\
&amp;= \gamma_{PA} + \lambda_{Nov} - (\gamma_{PA} + \lambda_{Feb}) \\
&amp;= \underbrace{\lambda_{Nov} - \lambda_{Feb}}_{\text{time trend}}
\end{align}`
$$

--

`\(\rightarrow\)` the comparison group allows to estimate the ***time trend***.

---

# Parallel Trends Assumption: Formally

Let `\(\delta\)` denote the true impact of the minimum wage increase:

`$$\mathbb{E}[Y_{ist}^1 - Y_{ist}^0|s,t] = \delta$$`

--

Outcomes in the treatment group:

`$$\mathbb{E}[Y_{ist}|s = \text{New Jersey}, t = \text{Feb}] = \gamma_{NJ} + \lambda_{Feb}$$`
--

`$$\mathbb{E}[Y_{ist}|s = \text{New Jersey}, t = \text{Nov}] = \gamma_{NJ} + \delta + \lambda_{Nov}$$`
--

$$
`\begin{align}
\mathbb{E}[Y_{ist}&amp;|s = \text{New Jersey}, t = \text{Nov}] - \mathbb{E}[Y_{ist}|s = \text{New Jersey}, t = \text{Feb}] \\
&amp;= \gamma_{NJ} + \delta + \lambda_{Nov} - (\gamma_{NJ} + \lambda_{Feb}) \\
&amp;= \delta + \lambda_{Nov} - \lambda_{Feb}
\end{align}`
$$

---

# Parallel Trends Assumption: Formally

Let `\(\delta\)` denote the true impact of the minimum wage increase:

`$$\mathbb{E}[Y_{ist}^1 - Y_{ist}^0|s,t] = \delta$$`

Outcomes in the treatment group:

`$$\mathbb{E}[Y_{ist}|s = \text{New Jersey}, t = \text{Feb}] = \gamma_{NJ} + \lambda_{Feb}$$`

`$$\mathbb{E}[Y_{ist}|s = \text{New Jersey}, t = \text{Nov}] = \gamma_{NJ} + \delta + \lambda_{Nov}$$`

$$
`\begin{align}
\mathbb{E}[Y_{ist}&amp;|s = \text{New Jersey}, t = \text{Nov}] - \mathbb{E}[Y_{ist}|s = \text{New Jersey}, t = \text{Feb}] \\
&amp;= \gamma_{NJ} + \delta + \lambda_{Nov} - (\gamma_{NJ} + \lambda_{Feb}) \\
&amp;= \delta + \underbrace{\lambda_{Nov} - \lambda_{Feb}}_{\text{time trend}}
\end{align}`
$$

---

# Parallel Trends Assumption: Formally

Therefore we have:

$$
`\begin{align}
\mathbb{E}[Y_{ist}&amp;|s = \text{PA},t = \text{Nov}] - \mathbb{E}[Y_{ist}| s = \text{PA},t = \text{Feb}] = \underbrace{\lambda_{Nov} - \lambda_{Feb}}_{\text{time trend}}
\end{align}`
$$

--

$$
`\begin{align}
\mathbb{E}[Y_{ist}&amp;|s = \text{NJ},t = \text{Nov}] - \mathbb{E}[Y_{ist}| s = \text{NJ},t = \text{Feb}] = \delta + \underbrace{\lambda_{Nov} - \lambda_{Feb}}_{\text{time trend}}
\end{align}`
$$

--

$$
`\begin{align}
DD &amp;= \mathbb{E}[Y_{ist}|s = \text{NJ}, t = \text{Nov}] - \mathbb{E}[Y_{ist}|s = \text{NJ}, t = \text{Feb}] \\
&amp; \qquad \qquad - \Big(\mathbb{E}[Y_{ist}|s = \text{PA},t = \text{Nov}] - \mathbb{E}[Y_{ist}| s = \text{PA},t = \text{Feb}]\Big) \\
&amp;= \delta + \lambda_{Nov} - \lambda_{Feb} - (\lambda_{Nov} - \lambda_{Feb}) \\
&amp;= \delta
\end{align}`
$$
